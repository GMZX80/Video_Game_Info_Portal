{% extends "base.html" %}
{% block content %}
<section class="page-hero compact-page-hero">
  <div class="narrative-wrap">
    <p class="eyebrow"><span>Search</span> · public archive</p>
    <h1>Search the public archive.</h1>
    <p class="hero-deck">Stories, games, magazine/source records, people, organisations and North East collection entries in one place.</p>
  </div>
</section>
<section class="narrative-band">
  <div class="narrative-wrap search-panel">
    <label for="narrative-search">Search by title, person, studio, game, place, magazine or evidence status</label>
    <input id="narrative-search" type="search" data-search-index="{{ asset_prefix }}assets/data/generated/public-search-index.json" data-asset-prefix="{{ asset_prefix }}" autocomplete="off">
    <div id="narrative-search-results" class="search-results" aria-live="polite"></div>
  </div>
</section>
{% endblock %}
