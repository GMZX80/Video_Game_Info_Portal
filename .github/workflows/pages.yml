name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest -q

      - name: Build datastore from committed records
        run: python -m scripts.build_all --skip-fetch

      - name: Build clean Pages artefact
        run: python -m scripts.build_dist

      - name: Verify generated files are current
        run: git diff --exit-code -- assets/data/generated reports research/entity-resolution-queue.csv data/curated

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Validate static site
        run: node tools/validate-site.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
