name: Validate datastore and static site

on:
  pull_request:
  push:
    branches: [main, codex/magazine-evidence-datastore]
  workflow_dispatch:
    inputs:
      refresh_detailed_archives:
        description: Run the external detailed archive refresh and commit results to the research branch
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest -q

      - name: Build datastore from committed records
        run: python -m scripts.build_all --skip-fetch

      - name: Build clean Pages artefact
        run: python -m scripts.build_dist

      - name: Validate generated files are current
        run: git diff --exit-code -- assets/data/generated reports research/entity-resolution-queue.csv data/curated

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Validate static site
        run: node tools/validate-site.mjs

  refresh-detailed-archives:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.refresh_detailed_archives == true
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v5
        with:
          ref: codex/magazine-evidence-datastore
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run parser tests before external requests
        run: python -m pytest -q

      - name: Capture detailed Sinclair User and Stairway metadata
        run: python -m scripts.ingest.run_detailed --resume --include-catalogues --accessed-date 2026-06-19

      - name: Build clean Pages artefact
        run: python -m scripts.build_dist

      - name: Validate static site
        run: node tools/validate-site.mjs

      - name: Commit refreshed metadata to the research branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/raw/source-page-inventory.jsonl \
            data/raw/sinclair-user \
            data/raw/stairway \
            data/curated \
            assets/data/generated \
            reports \
            research/entity-resolution-queue.csv
          if git diff --cached --quiet; then
            echo "No refreshed metadata changes to commit."
            exit 0
          fi
          git commit -m "Refresh detailed Sinclair User and Stairway metadata"
          git push origin HEAD:codex/magazine-evidence-datastore
