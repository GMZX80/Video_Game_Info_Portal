name: Media permission
description: Provide or clarify rights and permission for a photograph or media item.
title: "Media permission: "
labels: ["media-permission", "needs-review"]
body:
  - type: markdown
    attributes:
      value: "Permission to use a copy is not automatically copyright ownership. Media permissions enter review first."
  - type: input
    id: media
    attributes:
      label: Media item or page
    validations:
      required: true
  - type: input
    id: rights-holder
    attributes:
      label: Rights holder, if known
  - type: input
    id: photographer
    attributes:
      label: Photographer, if known
  - type: dropdown
    id: permission
    attributes:
      label: Permission offered
      options:
        - May display publicly
        - May display with credit
        - May use for research only
        - Permission unclear
        - Permission withdrawn
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Original context and caption
      description: Provide where the image came from and any original caption.
    validations:
      required: true
